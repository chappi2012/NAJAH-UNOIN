<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NAJAH Union</title>
<style>
:root{--dark:#0F1219;--card:#1a1f2e;--input:#252c3d;--red:#FF6B6B;--cyan:#4ECDC4;--gold:#FFE66D;--text:#E8E8E8;--muted:#A8A8A8}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:#0F1219;color:var(--text);font-family:Arial,sans-serif}
body{display:flex;align-items:center;justify-content:center;padding:20px}

/* LOGIN SCREEN */
#loginScreen{position:fixed;inset:0;background:linear-gradient(135deg,#0F1219,#1a0033);display:flex;align-items:center;justify-content:center;z-index:1000}
#loginScreen.hidden{display:none}
.login-box{background:var(--card);padding:40px;border-radius:20px;width:100%;max-width:400px;border:2px solid var(--cyan)}
.login-box h1{background:linear-gradient(135deg,var(--red),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:30px;font-size:2em;text-align:center}
.login-field{margin-bottom:20px}
.login-field label{display:block;margin-bottom:8px;color:var(--cyan);font-weight:bold}
.login-field input{width:100%;padding:12px;background:var(--input);border:2px solid var(--cyan);color:var(--text);border-radius:8px;font-size:14px}
.login-btn{width:100%;padding:12px;background:linear-gradient(135deg,var(--red),var(--gold));color:#000;border:none;border-radius:8px;font-weight:bold;cursor:pointer;margin-top:20px;font-size:16px}
.login-btn:hover{opacity:0.9}
.login-error{color:var(--red);margin-top:15px;text-align:center;font-weight:bold;display:none}
.login-error.show{display:block}

/* HEADER */
header{background:linear-gradient(90deg,var(--card),#252c3d);padding:20px;border-bottom:2px solid var(--cyan);display:flex;justify-content:space-between;align-items:center}
header h1{background:linear-gradient(135deg,var(--red),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin:0}
.nav-buttons{display:flex;gap:15px}
.nav-btn{padding:10px 20px;background:var(--cyan);color:#000;border:none;border-radius:6px;cursor:pointer;font-weight:bold}
.nav-btn.active{background:var(--red)}
.logout-btn{padding:8px 15px;background:var(--red);color:#fff;border:none;border-radius:6px;cursor:pointer;font-weight:bold}
.user-info{color:var(--cyan);font-weight:bold}

/* MAIN CONTENT */
#app{display:none}
#app.show{display:block}
.content{max-width:1200px;margin:20px auto;padding:0 20px}
.panel{display:none;margin-bottom:30px}
.panel.active{display:block}

/* SECTIONS */
.section{background:var(--card);border:2px solid var(--cyan);border-radius:15px;padding:25px;margin-bottom:20px}
.section h2{color:var(--gold);margin-bottom:20px;font-size:1.5em}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:15px;margin-bottom:20px}
.team-card{background:linear-gradient(135deg,var(--red),var(--gold));color:#000;padding:20px;border-radius:10px;text-align:center;font-weight:bold;cursor:pointer}
.team-name{font-size:1.1em;margin:10px 0}
.team-emoji{font-size:2em;margin-bottom:10px}

/* LEADERBOARD */
.leaderboard{background:var(--input);border-radius:10px;overflow:hidden}
.lb-row{padding:15px;border-bottom:1px solid rgba(78,205,196,0.2);display:flex;justify-content:space-between;align-items:center}
.lb-row:last-child{border-bottom:none}
.lb-rank{color:var(--gold);font-weight:bold;font-size:1.2em;min-width:40px}
.lb-name{flex:1;margin-left:15px;color:var(--text)}
.lb-points{color:var(--cyan);font-weight:bold}

/* TEAM EDITOR */
.team-editor-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:15px;margin:20px 0}
.team-editor-card{background:var(--input);border:2px solid var(--cyan);padding:15px;border-radius:10px}
.team-editor-card input{width:100%;padding:10px;margin-bottom:10px;background:var(--card);color:var(--text);border:1px solid var(--cyan);border-radius:6px}
.team-editor-card input[type="color"]{height:40px;cursor:pointer}

/* BUTTONS */
.btn-row{display:flex;gap:10px;margin:20px 0}
.btn{padding:12px 25px;border:none;border-radius:8px;cursor:pointer;font-weight:bold;flex:1}
.btn-save{background:linear-gradient(135deg,var(--red),var(--gold));color:#000}
.btn-reset{background:var(--input);color:var(--cyan);border:2px solid var(--cyan)}
.btn:hover{opacity:0.9}

/* MEMBER ADD */
.member-form{background:var(--input);padding:15px;border-radius:10px;margin-bottom:20px;display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:10px}
.member-form input,.member-form select{padding:10px;background:var(--card);color:var(--text);border:1px solid var(--cyan);border-radius:6px}
.member-form button{padding:10px 20px;background:var(--cyan);color:#000;border:none;border-radius:6px;cursor:pointer;font-weight:bold}

/* MESSAGE */
.message{padding:15px;border-radius:8px;margin:15px 0;display:none;font-weight:bold;border:2px solid}
.message.show{display:block}
.message.success{background:rgba(78,205,196,0.2);color:var(--cyan);border-color:var(--cyan)}
.message.error{background:rgba(255,107,107,0.2);color:var(--red);border-color:var(--red)}

/* RESPONSIVE */
@media(max-width:768px){
  .member-form{grid-template-columns:1fr}
  .grid{grid-template-columns:repeat(auto-fit,minmax(120px,1fr))}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-box">
    <h1>NAJAH Union</h1>
    <div class="login-field">
      <label>Email:</label>
      <input type="email" id="email" value="admin@example.com" placeholder="admin@example.com">
    </div>
    <div class="login-field">
      <label>Password:</label>
      <input type="password" id="password" value="admin123" placeholder="admin123">
    </div>
    <button class="login-btn" onclick="login()">🚀 Log In</button>
    <button class="login-btn" style="background:var(--cyan);color:#000;margin-top:10px" onclick="signup()">✨ Sign Up</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <header>
    <h1>NAJAH Union</h1>
    <div style="flex:1;margin-left:30px">
      <div class="nav-buttons">
        <button class="nav-btn active" onclick="switchTab('dashboard')">📊 Dashboard</button>
        <button class="nav-btn" onclick="switchTab('admin')">⚙️ Admin</button>
      </div>
    </div>
    <div>
      <span class="user-info" id="userDisplay"></span>
      <button class="logout-btn" onclick="logout()">Log Out</button>
    </div>
  </header>

  <div class="content">
    <!-- DASHBOARD -->
    <div class="panel active" id="dashboard">
      <div class="section">
        <h2>🏆 Teams</h2>
        <div class="grid" id="teamDisplay"></div>
      </div>
      <div class="section">
        <h2>👥 Leaderboard</h2>
        <div class="leaderboard" id="leaderboard"></div>
      </div>
    </div>

    <!-- ADMIN -->
    <div class="panel" id="admin">
      <div class="section">
        <h2>🎨 Team Settings</h2>
        <div style="margin-bottom:20px">
          <label style="color:var(--cyan);font-weight:bold;display:block;margin-bottom:10px">How many teams?</label>
          <select id="teamCount" onchange="updateTeamCount()" style="padding:10px;background:var(--input);color:var(--text);border:1px solid var(--cyan);border-radius:6px">
            <option value="2">2</option>
            <option value="3" selected>3</option>
            <option value="4">4</option>
            <option value="5">5</option>
            <option value="6">6</option>
            <option value="7">7</option>
            <option value="8">8</option>
          </select>
        </div>
        <div class="team-editor-grid" id="teamEditor"></div>
        <div class="btn-row">
          <button class="btn btn-save" onclick="saveTeams()">💾 Save</button>
          <button class="btn btn-reset" onclick="resetTeams()">↻ Reset</button>
        </div>
        <div class="message" id="teamMsg"></div>
      </div>

      <div class="section">
        <h2>👤 Add Member</h2>
        <div class="member-form">
          <input type="text" id="newName" placeholder="Name">
          <input type="number" id="newPoints" placeholder="Points" value="0">
          <select id="newTeam"></select>
          <button onclick="addMember()">➕ Add</button>
        </div>
        <div class="message" id="memberMsg"></div>
        <div id="memberList"></div>
      </div>
    </div>
  </div>
</div>

<script>
const db = {
  users: [{id:1,email:'admin@example.com',password:'admin123',name:'Admin'}],
  teams: [
    {id:1,name:'Phoenix',color:'#FF6B6B'},
    {id:2,name:'Falcon',color:'#4ECDC4'},
    {id:3,name:'Warriors',color:'#FFE66D'}
  ],
  members: [
    {id:1,name:'Layla',team:1,points:250},
    {id:2,name:'Omar',team:2,points:180},
    {id:3,name:'Sara',team:3,points:200}
  ]
};

let user = null;

function login(){
  const email = document.getElementById('email').value;
  const pwd = document.getElementById('password').value;
  const u = db.users.find(x=>x.email===email && x.password===pwd);
  if(!u){
    document.getElementById('loginError').textContent='❌ Invalid email/password';
    document.getElementById('loginError').classList.add('show');
    return;
  }
  user = u;
  localStorage.setItem('user',JSON.stringify(u));
  enter();
}

function signup(){
  const email = prompt('Email:');
  const pwd = prompt('Password:');
  const name = prompt('Name:');
  if(!email||!pwd||!name)return;
  if(db.users.find(x=>x.email===email)){
    alert('Email exists');
    return;
  }
  const newU = {id:db.users.length+1,email,password:pwd,name};
  db.users.push(newU);
  user = newU;
  localStorage.setItem('user',JSON.stringify(newU));
  enter();
}

function enter(){
  document.getElementById('loginScreen').classList.add('hidden');
  document.getElementById('app').classList.add('show');
  document.getElementById('userDisplay').textContent=`Hi, ${user.name}!`;
  render();
}

function logout(){
  user = null;
  localStorage.removeItem('user');
  location.reload();
}

function switchTab(tab){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById(tab).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  event.target.classList.add('active');
}

function updateTeamCount(){
  const n = parseInt(document.getElementById('teamCount').value);
  while(db.teams.length<n)db.teams.push({id:db.teams.length+1,name:`Team ${db.teams.length+1}`,color:'#'+Math.random().toString(16).slice(2,8)});
  db.teams = db.teams.slice(0,n);
  renderTeamEditor();
}

function renderTeamEditor(){
  const html = db.teams.map((t,i)=>`
    <div class="team-editor-card">
      <input type="text" value="${t.name}" onchange="db.teams[${i}].name=this.value;render()">
      <input type="color" value="${t.color}" onchange="db.teams[${i}].color=this.value;render()">
    </div>
  `).join('');
  document.getElementById('teamEditor').innerHTML = html;
}

function saveTeams(){
  const msg = document.getElementById('teamMsg');
  msg.textContent = `✅ Saved ${db.teams.length} teams!`;
  msg.classList.add('show','success');
  render();
  setTimeout(()=>msg.classList.remove('show'),3000);
}

function resetTeams(){
  db.teams = [
    {id:1,name:'Phoenix',color:'#FF6B6B'},
    {id:2,name:'Falcon',color:'#4ECDC4'},
    {id:3,name:'Warriors',color:'#FFE66D'}
  ];
  document.getElementById('teamCount').value = 3;
  updateTeamCount();
}

function addMember(){
  const name = document.getElementById('newName').value;
  const points = parseInt(document.getElementById('newPoints').value)||0;
  const team = parseInt(document.getElementById('newTeam').value);
  if(!name)return alert('Name required');
  db.members.push({id:db.members.length+1,name,team,points});
  document.getElementById('newName').value='';
  document.getElementById('newPoints').value='0';
  const msg = document.getElementById('memberMsg');
  msg.textContent=`✅ Added ${name}!`;
  msg.classList.add('show','success');
  render();
  setTimeout(()=>msg.classList.remove('show'),3000);
}

function render(){
  renderTeams();
  renderLeaderboard();
  renderMembers();
  renderTeamEditor();
  updateTeamDropdown();
}

function renderTeams(){
  const html = db.teams.map(t=>{
    const pts = db.members.filter(m=>m.team===t.id).reduce((s,m)=>s+m.points,0);
    return `<div class="team-card" style="background:${t.color}!important">${t.name}<br>${pts} pts</div>`;
  }).join('');
  document.getElementById('teamDisplay').innerHTML = html;
}

function renderLeaderboard(){
  const sorted = [...db.members].sort((a,b)=>b.points-a.points);
  const html = sorted.map((m,i)=>{
    const t = db.teams.find(x=>x.id===m.team);
    return `<div class="lb-row"><div class="lb-rank">#${i+1}</div><div class="lb-name">${m.name} (${t.name})</div><div class="lb-points">${m.points}</div></div>`;
  }).join('');
  document.getElementById('leaderboard').innerHTML = html;
}

function renderMembers(){
  const html = db.members.map(m=>{
    const t = db.teams.find(x=>x.id===m.team);
    return `<div class="lb-row"><div><strong>${m.name}</strong><br><span style="color:var(--muted)">${t.name}</span></div><div class="lb-points">${m.points} pts</div></div>`;
  }).join('');
  document.getElementById('memberList').innerHTML = html;
}

function updateTeamDropdown(){
  const html = db.teams.map(t=>`<option value="${t.id}">${t.name}</option>`).join('');
  document.getElementById('newTeam').innerHTML = html;
}

window.addEventListener('load',()=>{
  const saved = localStorage.getItem('user');
  if(saved){
    user = JSON.parse(saved);
    enter();
  }
  updateTeamCount();
});
</script>

</body>
</html>
